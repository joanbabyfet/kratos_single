# deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kratos-single
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kratos-single
  template:
    metadata:
      labels:
        app: kratos-single
    spec:
      containers:
        - name: kratos-single
          image: kratos_single:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
            - containerPort: 9000
syntax = "proto3";

package api.admin.article.v1;

option go_package = "kratos_single/api/admin/article/v1;adminarticlev1";

import "google/api/annotations.proto";

// ==================== Service ====================
service AdminArticle {

  // 新增, 推荐统一：/v1/端/模块/动作
  rpc CreateArticle (CreateArticleReq) returns (CreateArticleReply) {
    option (google.api.http) = {
      post: "/v1/admin_api/article/add"
      body: "*"
    };
  }

  // 更新
  rpc UpdateArticle (UpdateArticleReq) returns (UpdateArticleReply) {
    option (google.api.http) = {
      post: "/v1/admin_api/article/edit"
      body: "*"
    };
  }

  // 详情
  rpc GetArticle (GetArticleReq) returns (GetArticleReply) {
    option (google.api.http) = {
      get: "/v1/admin_api/article/detail"
    };
  }

  // 列表（分页）
  rpc GetArticleList (GetArticleListReq) returns (GetArticleListReply) {
    option (google.api.http) = {
      get: "/v1/admin_api/article"
    };
  }

  // 删除（软删除）
  rpc DeleteArticle (DeleteArticleReq) returns (DeleteArticleReply) {
    option (google.api.http) = {
      post: "/v1/admin_api/article/delete"
      body: "*"
    };
  }
}

// ==================== Create ====================

message CreateArticleReq {
  int32 catid = 1;
  string title = 2;
  string info = 3;
  string content = 4;
  string img = 5;
  string author = 6;
  int32 sort = 7;
}

message CreateArticleReply {
  int64 id = 1;
}

// ==================== Update ====================

message UpdateArticleReq {
  int64 id = 1;
  int32 catid = 2;
  string title = 3;
  string info = 4;
  string content = 5;
  string img = 6;
  string author = 7;
  int32 sort = 8;
}

message UpdateArticleReply {}

// ==================== Detail ====================

message GetArticleReq {
  int64 id = 1;
}

message GetArticleReply {
  int64 id = 1;
  int32 catid = 2;
  string title = 3;
  string info = 4;
  string content = 5;
  string img = 6;
  string author = 7;
  string extra = 8;
  int32 sort = 9;
  int32 status = 10;
}

// ==================== List ====================

message GetArticleListReq {
  string title = 1;
  int32 catid = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ArticleItem {
  int64 id = 1;
  int32 catid = 2;
  string title = 3;
  string info = 4;
  string content = 5;
  string img = 6;
  string author = 7;
  string extra = 8;
  int32 sort = 9;
  int32 status = 10;
}

message GetArticleListReply {
  repeated ArticleItem list = 1;
  int64 total = 2;
}

// ==================== Delete ====================

message DeleteArticleReq {
  int64 id = 1;
}

message DeleteArticleReply {}